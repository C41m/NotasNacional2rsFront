<div class="container">
  <div class="header-section">
    <h2>Cadastrar Nova Empresa</h2>
  </div>

  <div class="alert alert-success" *ngIf="success">
    Empresa cadastrada com sucesso! Redirecionando...
  </div>

  <div class="alert alert-error" *ngIf="error">
    {{ error }}
  </div>

  <div class="form-section">
    <form (ngSubmit)="onSubmit()" #companyForm="ngForm">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" [(ngModel)]="model.nome" name="nome" required class="form-control" placeholder="Razão social da empresa">
      </div>

      <div class="form-group">
        <label for="cnpj">CNPJ</label>
        <input type="text" id="cnpj" [(ngModel)]="model.cnpj" name="cnpj" required class="form-control" placeholder="00.000.000/0000-00">
      </div>

      <div class="form-group">
        <label for="certificate">Certificado (PFX)</label>
        <input type="file" id="certificate" (change)="onFileSelected($event)" accept=".pfx" required class="form-control">
      </div>

      <div class="form-group">
        <label for="password">Senha do Certificado</label>
        <input type="password" id="password" [(ngModel)]="model.password" name="password" required class="form-control">
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Cadastrar</span>
        <span *ngIf="loading">Cadastrando...</span>
      </button>
    </form>
  </div>

  <a routerLink="/companies" class="back-link">← Voltar para lista</a>
</div>
